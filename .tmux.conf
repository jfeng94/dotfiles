# .tmux.conf

set -g update-environment "SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Switch panes with Alt-arrow (no prefix)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Swap windows
bind -n C-S-Left  swap-window -t -1
bind -n C-S-Right swap-window -t +1

# Mouse
set -g mouse on

# Don't rename windows automatically
set-option -g allow-rename off

# No delay after ESC
set -sg escape-time 0

# History
set -g history-limit 10000

##############
### COLORS ###
##############
ACCENT='#0077ee'
ACCENT2='#ffbe18'
BLACK='#000000'
GREY='#444444'
LIGHT_GREY='#aaaaaa'
WHITE='#ffffff'
BLUE='#0000FF'
DARK_BLUE='#000087'
LIGHT_BLUE='#70d7ff'

######################
### DESIGN CHANGES ###
######################
set -g default-terminal "screen-256color"

set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

setw -g clock-mode-colour colour5
setw -g mode-style fg="#FFFFFF",bg="#000087",bold

set -g pane-active-border-style fg="#0077ee",bg="#000000"
set -g pane-border-style fg="#444444",bg="#000000"

# Status bar
set -g status-position bottom
set -g status-justify left
setw -g status-style fg="#FFFFFF",bg="#000087",dim
set -g status-left ''

set -g status-right '#[fg=#000000,bg=#ffbe18,bold]#(~/.dotfiles/scripts/tmux/tmux_git_status.sh)\
#[fg=#FFFFFF,bg=#0000FF] %h %d %Y \
#[fg=#000000,bg=#70d7ff] %l:%M:%S %p '

set -g status-right-length 100
set -g status-left-length 20

# Window status
setw -g window-status-current-style ''
setw -g window-status-current-format '#[fg=#FFFFFF bg=#0000FF bold] #I: #W #F '
setw -g window-status-style ''
setw -g window-status-format '#[fg=#aaaaaa bg=#000087 dim] #I: #W #F '
setw -g window-status-bell-style 'fg=colour255 bg=colour1 bold'

set -g message-style fg="#000000",bg="#ffbe18",bold

#############################
# PANE BORDER STATUS        #
#############################
set -g pane-border-status bottom
set -g pane-border-format '┤ #(~/.dotfiles/scripts/tmux/pane-border-format.sh \
    --pane-current-path=#{pane_current_path} \
    --pane-active=#{pane_active} \
    ) ├'
set -g status-interval 5
